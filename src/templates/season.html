{% extends 'base.html' %}
{% block title %}{{ title }} – CourtCraft{% endblock %}

{% block fullwidth %}
  <div class="season-hero d-flex align-items-center">
    <div class="container text-center">
      <h2 class="display-4 mb-4 text-white">{{ title }}</h2>

      <div class="d-grid gap-2 col-md-6 mx-auto">
        <a
          href="{{ url_for('season_data_page', season=season_url) }}"
          class="btn btn-lg btn-primary"
        >
          View Stats Leaders
        </a>
        <a
          href="{{ url_for('team_assemble_page', season=season_url) }}"
          class="btn btn-lg btn-secondary"
        >
          Assemble Team
        </a>
        <a
          href="{{ url_for('compare_teams', season=season_url) }}"
          class="btn btn-lg btn-secondary"
        >
          Compare Teams
        </a>
        <a
          href="{{ url_for('trade_analyzer_page', season=season_url) }}"
          class="btn btn-lg btn-secondary"
        >
          Trade Analyzer
        </a>
        <a
          href="{{ url_for('league_teams_page', season=season_url) }}"
          class="btn btn-lg btn-secondary"
        >
          League Teams
        </a>
        <a
          href="{{ url_for('waiver_wire_page', season=season_url) }}"
          class="btn btn-lg btn-secondary"
        >
          Waiver Wire
        </a>
        <form method="post" action="{{ url_for('sync_bbm_for_season', season=season_url) }}">
          <button type="submit" class="btn btn-lg btn-outline-light w-100">
            Sync Latest BBM Data
          </button>
        </form>
        <!-- 🟡 NEW Board button -->
        <a
          href="{{ url_for('board_page', season=season_url) }}"
          class="btn btn-lg btn-warning"
        >
          Board
        </a>
      </div>
    </div>
  </div>
{% endblock %}

{% block content %}
{% endblock %}
